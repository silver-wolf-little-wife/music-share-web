services:
  music-share:
    image: registry.cn-hangzhou.aliyuncs.com/chengxiyue/music-share-web:latest
    # 备用: ghcr.io/silver-wolf-little-wife/music-share-web:latest
    # 如需本地构建，注释掉上面那行，取消注释下面这行：
    # build: .
    container_name: music-share
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./music:/app/music
      - ./public/covers:/app/public/covers
      - ./data:/app/data          # SQLite 数据库持久化
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/music.db
      - SESSION_SECRET=change-this-to-a-random-string
    # 低内存服务器限制
    mem_limit: 256m
    memswap_limit: 512m
